<!DOCTYPE html>
<html lang="es">

<head>

    <meta name="viewport" content="width=device-width,initial-scale=1" />

</head>

<body>
    <header class="top-nav" id="top-nav" role="banner">
        <a href="index.html" class="nav-brand">Dept. Creativo</a>

        <div class="nav-controls">
            <button class="theme-switch-pill" id="theme-switch-pill" aria-label="Cambiar tema día/noche" type="button"
                aria-pressed="false">
                <span class="indicator" aria-hidden="true">
                    <svg class="moon-icon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor"
                        stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg class="sun-icon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor"
                        stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </span>
            </button>

            <a href="index.html" class="btn">Inicio</a>
        </div>
    </header>

    <div class="noise-overlay" id="noise-overlay" aria-hidden="true"></div>
    <div id="hero-bg" aria-hidden="true"></div>
    <canvas id="hero-noise" aria-hidden="true"></canvas>

    <main class="project-detail-layout container" id="project-detail" tabindex="-1">
        <!-- Columna fija editorial (se rellenará desde JS) -->
        <aside class="project-fixed-col" aria-labelledby="project-title">
            <div class="detail-meta" id="detail-meta">
                <h1 id="project-title" class="detail-title">Cargando…</h1>
                <div class="detail-category">—</div>
                <p class="detail-description">Cargando descripción…</p>

                <dl class="detail-info" role="list" id="detail-info">
                    <!-- items inyectados -->
                </dl>

                <div class="detail-cta">
                    <a href="contact.html" class="btn cta-btn" id="cta-contacto">Hablemos</a>
                </div>

                <div class="footer-small">
                    <p class="footer-copyright">© 2026 Imprudente Dept. Creativo</p>
                </div>
            </div>
        </aside>

        <!-- Contenido principal: galería vertical -->
        <section class="detail-content">
            <div id="detail-gallery" class="detail-gallery" role="region" aria-label="Galería del proyecto">
                <!-- Imágenes inyectadas por script.js -->
            </div>
        </section>
    </main>

    <!-- Lightbox (estilos inline mínimos para no depender de CSS adicional) -->
    <div id="project-lightbox" class="project-lightbox" role="dialog" aria-modal="true" aria-hidden="true"
        style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;padding:24px;">
        <div class="project-lightbox-inner"
            style="position:relative;max-width:1200px;width:100%;max-height:92vh;display:flex;align-items:center;justify-content:center;">
            <button id="lb-close" aria-label="Cerrar"
                style="position:absolute;top:12px;right:12px;background:transparent;border:none;color:#fff;font-size:28px;cursor:pointer;padding:8px;line-height:1">✕</button>
            <button id="lb-prev" aria-label="Anterior"
                style="position:absolute;left:8px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#fff;font-size:40px;cursor:pointer;padding:8px">‹</button>
            <img id="lb-image" src="" alt=""
                style="max-width:100%;max-height:92vh;border-radius:6px;box-shadow:0 12px 40px rgba(0,0,0,0.6);">
            <button id="lb-next" aria-label="Siguiente"
                style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#fff;font-size:40px;cursor:pointer;padding:8px">›</button>
            <div id="lb-caption"
                style="position:absolute;bottom:18px;left:50%;transform:translateX(-50%);color:#fff;background:rgba(0,0,0,0.45);padding:8px 12px;border-radius:6px;font-size:0.95rem">
            </div>
        </div>
    </div>

    <!-- Tu script principal (si ya existe script.js, lo dejamos; el siguiente script asume que script.js no sobrescribe estas funciones) -->
    <script src="script.js"></script>

    <!-- Script que carga projects.md, parsea y renderiza el proyecto actual + lightbox -->
    <script>
        (function () {
            // Utilidades
            function qs(name) {
                const params = new URLSearchParams(location.search);
                return params.get(name);
            }

            function fetchText(url) {
                return fetch(url).then(res => {
                    if (!res.ok) throw new Error('No se pudo cargar ' + url);
                    return res.text();
                });
            }

            // Parser simple para tu formato de projects.md
            function parseProjectsMd(mdText) {
                // Divide por bloques que empiezan con "## "
                const blocks = mdText.split(/\n(?=##\s+)/).map(b => b.trim()).filter(Boolean);
                const projects = [];

                blocks.forEach(block => {
                    // Primera línea: "## TÍTULO"
                    const lines = block.split('\n').map(l => l.replace(/\r/g, ''));
                    const titleLine = lines[0].replace(/^##\s+/, '').trim();
                    const obj = { title: titleLine };

                    // Resto: parse key: value y gallery list
                    let i = 1;
                    while (i < lines.length) {
                        const line = lines[i].trim();
                        if (!line) { i++; continue; }

                        // gallery: list
                        if (/^gallery:\s*$/.test(line)) {
                            i++;
                            const gallery = [];
                            while (i < lines.length && /^\s*-\s+/.test(lines[i])) {
                                const item = lines[i].replace(/^\s*-\s+/, '').trim();
                                if (item) gallery.push(item);
                                i++;
                            }
                            obj.gallery = gallery;
                            continue;
                        }

                        // key: value (simple)
                        const kv = line.match(/^([a-zA-Z0-9_-]+)\s*:\s*(.+)$/);
                        if (kv) {
                            const key = kv[1].trim();
                            let val = kv[2].trim();
                            // Si el valor contiene "—" o ";" lo dejamos tal cual; no intentamos convertir tipos
                            obj[key] = val;
                        }
                        i++;
                    }

                    // Normalizar id a minúsculas sin espacios si no existe
                    if (!obj.id) {
                        obj.id = obj.title.toLowerCase().replace(/[^\w-]+/g, '-').replace(/^-+|-+$/g, '');
                    }

                    projects.push(obj);
                });

                return projects;
            }

            // Render helpers: inyectan en tu DOM existente respetando clases
            function renderProject(project) {
                // Left column
                const titleEl = document.getElementById('project-title');
                const descEl = document.querySelector('.detail-description');
                const categoryEl = document.querySelector('.detail-category');
                const infoDl = document.getElementById('detail-info');

                if (titleEl) titleEl.textContent = project.title || '';
                if (descEl) descEl.textContent = project.description || '';
                if (categoryEl) categoryEl.textContent = project.category || '';

                // Limpiar y añadir metadatos (credits, year, services, client si existen)
                infoDl.innerHTML = '';
                const pushInfo = (label, value) => {
                    if (!value) return;
                    const wrapper = document.createElement('div');
                    wrapper.className = 'detail-info-item';
                    wrapper.setAttribute('role', 'listitem');
                    const dt = document.createElement('dt');
                    dt.className = 'detail-meta-label';
                    dt.textContent = label;
                    const dd = document.createElement('dd');
                    dd.className = 'detail-meta-val';
                    dd.textContent = value;
                    wrapper.appendChild(dt);
                    wrapper.appendChild(dd);
                    infoDl.appendChild(wrapper);
                };

                // Si en projects.md tienes keys como credits, client, year, services, las mostramos
                pushInfo('Créditos', project.credits);
                pushInfo('Servicios', project.services || project.services_list || project.services);
                pushInfo('Cliente', project.client || project.cliente);
                pushInfo('Año', project.year || project.Year || project.year);

                // CTA: si quieres personalizar el enlace con mailto o similar, puedes hacerlo aquí
                const cta = document.getElementById('cta-contacto');
                if (cta && project.contact) {
                    cta.href = project.contact;
                }

                // Right column: galería
                const galleryTrack = document.getElementById('detail-gallery');
                galleryTrack.innerHTML = ''; // limpiar

                const gallery = project.gallery || [];
                if (gallery.length === 0 && project.cover) {
                    // fallback: si no hay gallery, usar cover
                    gallery.push(project.cover);
                }

                gallery.forEach((src, idx) => {

                    const fig = document.createElement('figure');
                    fig.className = 'gallery-item';

                    const img = document.createElement('img');

                    img.src = src;
                    img.alt = `${project.title} — imagen ${idx + 1}`;
                    img.loading = 'lazy';

                    img.onload = () => {

                        const w = img.naturalWidth;
                        const h = img.naturalHeight;

                        if (w > h * 1.15) {
                            fig.classList.add('landscape');
                        }
                        else if (h > w * 1.15) {
                            fig.classList.add('portrait');
                        }
                        else {
                            fig.classList.add('square');
                        }
                    };

                    fig.appendChild(img);
                    galleryTrack.appendChild(fig);

                });
                // Inicializar lightbox sobre las imágenes recién insertadas
                initLightbox();
            }

            // Lightbox (usa elementos ya presentes en DOM)
            function initLightbox() {
                const galleryTrack = document.getElementById('detail-gallery');
                const imgNodes = Array.from(galleryTrack.querySelectorAll('img'));
                const lightbox = document.getElementById('project-lightbox');
                const lbImage = document.getElementById('lb-image');
                const lbCaption = document.getElementById('lb-caption');
                const lbClose = document.getElementById('lb-close');
                const lbPrev = document.getElementById('lb-prev');
                const lbNext = document.getElementById('lb-next');

                if (!lightbox || imgNodes.length === 0) return;

                let currentIndex = 0;

                function openLightbox(index) {
                    const img = imgNodes[index];
                    if (!img) return;
                    lbImage.src = img.src;
                    lbImage.alt = img.alt || '';
                    lbCaption.textContent = img.alt || `${index + 1} / ${imgNodes.length}`;
                    lightbox.style.display = 'flex';
                    lightbox.setAttribute('aria-hidden', 'false');
                    currentIndex = index;
                    document.documentElement.style.overflow = 'hidden';
                    document.body.style.overflow = 'hidden';
                    lbClose.focus();
                }

                function closeLightbox() {
                    lightbox.style.display = 'none';
                    lightbox.setAttribute('aria-hidden', 'true');
                    lbImage.src = '';
                    document.documentElement.style.overflow = '';
                    document.body.style.overflow = '';
                }

                function showIndex(delta) {
                    currentIndex = (currentIndex + delta + imgNodes.length) % imgNodes.length;
                    openLightbox(currentIndex);
                }

                // Bind events
                imgNodes.forEach((img, idx) => {
                    if (!img.hasAttribute('tabindex')) img.setAttribute('tabindex', '0');
                    img.addEventListener('click', (e) => {
                        e.preventDefault();
                        openLightbox(idx);
                    });
                    img.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            openLightbox(idx);
                        }
                    });
                });

                lbClose.addEventListener('click', closeLightbox);
                lbPrev.addEventListener('click', () => showIndex(-1));
                lbNext.addEventListener('click', () => showIndex(1));

                lightbox.addEventListener('click', (e) => {
                    if (e.target === lightbox) closeLightbox();
                });

                document.addEventListener('keydown', (e) => {
                    if (lightbox.style.display === 'flex') {
                        if (e.key === 'Escape') closeLightbox();
                        else if (e.key === 'ArrowRight') showIndex(1);
                        else if (e.key === 'ArrowLeft') showIndex(-1);
                    }
                });
            }

            // Main: cargar projects.md y renderizar proyecto por id
            (function main() {
                const projectId = qs('id');
                if (!projectId) {
                    // Si no hay id, podrías redirigir a index o mostrar un mensaje
                    console.warn('No se proporcionó id en la query string. Usa ?id=ish');
                    return;
                }

                fetchText('projects.md')
                    .then(md => {
                        const projects = parseProjectsMd(md);
                        // Buscar por id exacto (case-insensitive)
                        const project = projects.find(p => (p.id || '').toLowerCase() === projectId.toLowerCase());
                        if (!project) {
                            console.error('Proyecto no encontrado:', projectId);
                            // Opcional: mostrar mensaje en UI
                            const titleEl = document.getElementById('project-title');
                            if (titleEl) titleEl.textContent = 'Proyecto no encontrado';
                            return;
                        }

                        // Normalizar campos: algunos valores pueden venir en una sola línea con separadores
                        // Por ejemplo credits: "Creative Direction & Design: Alejandro — Agency: Imprudente — Year: 2025"
                        // Si quieres, puedes parsear credits más finamente aquí; por ahora lo mostramos tal cual.
                        renderProject(project);
                    })
                    .catch(err => {
                        console.error('Error cargando projects.md', err);
                        const titleEl = document.getElementById('project-title');
                        if (titleEl) titleEl.textContent = 'Error cargando proyecto';
                    });
            })();
        })();
    </script>
</body>

</html>
